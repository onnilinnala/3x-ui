name: Build 3x-ui

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: craci-dev
    steps:
      - name: Provision Runner Resources
        uses: cracicorp/setup@v1
        with:
          size: "8"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod' # Dynamically uses the version from the repo
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Matches node:22-alpine from the Dockerfile
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install System Dependencies (CGO)
        # The Dockerfile uses build-base and gcc for Alpine; this installs the Ubuntu equivalents
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc curl unzip

      - name: Build Frontend & Generate Schemas
        working-directory: frontend
        # Runs `npm run gen` (Zod + OpenAPI generation) implicitly via `npm run build`
        run: |
          npm ci
          npm run build

      - name: Build Go Backend
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-D_LARGEFILE64_SOURCE"
        run: |
          # The Vite build likely outputs to internal/web/dist, ensuring it's bundled with the Go binary
          go build -ldflags "-w -s" -o build/x-ui main.go

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-ui-binary
          path: build/x-ui
          if-no-files-found: error
